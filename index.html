<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼성증권 APP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8edf5 100%);
            padding: 20px;
        }

        .container {
            text-align: center;
            background: ffffff;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            max-width: 480px;
            width: 100%;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 48px;
        }

        .download-btn {
            display: inline-block;
            width: 100%;
            padding: 22px 40px;
            background: #1e6fff;
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(30, 111, 255, 0.3);
        }

        .download-btn:hover {
            background: #1559d6;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 111, 255, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>삼성증권 APP</h1>
        <p class="subtitle">지금 바로 다운로드하고 금융 거래를 시작하세요</p>
        <a href="#" class="download-btn">다운로드</a>
    </div>
</body>
</html>
